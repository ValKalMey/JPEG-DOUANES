<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galler — Convertisseur Packaging</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --white: #ffffff;
    --offwhite: #f8f6f2;
    --light-gray: #f0ede8;
    --border: #e0d9d0;
    --border-dark: #c8bfb3;
    --brown: #b5651d;
    --brown-dark: #8b4a14;
    --brown-light: #d4844a;
    --brown-dim: rgba(181,101,29,0.1);
    --text: #2a1f14;
    --text-mid: #6b5a48;
    --text-light: #a89882;
    --red-err: #c0392b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--offwhite);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    position: fixed;
    inset: 0;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #auth-screen.fade-out {
    opacity: 0;
    transform: translateY(-20px);
    pointer-events: none;
  }

  .auth-box {
    width: 380px;
    text-align: center;
  }

  .auth-logo-img {
    width: 130px;
    height: auto;
    margin: 0 auto 0.6rem;
    display: block;
  }

  .auth-logo-sub {
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    color: var(--text-light);
    text-transform: uppercase;
    margin-bottom: 2.8rem;
  }

  .auth-divider {
    width: 50px;
    height: 1px;
    background: var(--brown);
    margin: 0 auto 2.5rem;
    opacity: 0.4;
  }

  .auth-label {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 0.7rem;
    display: block;
    text-align: left;
  }

  .auth-input {
    width: 100%;
    background: var(--offwhite);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    padding: 0.9rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 0.5rem;
  }
  .auth-input:focus { border-color: var(--brown); }
  .auth-input.error { border-color: var(--red-err); }

  .auth-error {
    font-size: 0.73rem;
    color: var(--red-err);
    text-align: left;
    margin-bottom: 1.1rem;
    min-height: 1.1rem;
    letter-spacing: 0.01em;
  }

  .auth-btn {
    width: 100%;
    background: var(--brown);
    color: #fff;
    border: none;
    border-radius: 3px;
    font-family: 'Lato', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .auth-btn:hover { background: var(--brown-dark); }
  .auth-btn:active { transform: scale(0.98); }

  /* ── MAIN APP ── */
  #app {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }
  #app.visible { display: flex; }

  /* Header */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1rem 3rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    animation: slideDown 0.5s ease both;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .header-logo-img {
    height: 52px;
    width: auto;
    display: block;
  }
  .header-sep {
    width: 1px;
    height: 32px;
    background: var(--border);
  }
  .header-title {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-light);
  }
  .header-user {
    margin-left: auto;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--text-light);
  }
  .header-user span { color: var(--brown); font-weight: 700; }

  /* Main layout */
  main {
    flex: 1;
    padding: 2.5rem 3rem;
    max-width: 1300px;
    width: 100%;
    margin: 0 auto;
    animation: fadeIn 0.6s 0.2s ease both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Controls bar */
  .controls {
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem 1.5rem;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .control-label {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mid);
    white-space: nowrap;
  }
  .quality-slider {
    -webkit-appearance: none;
    width: 140px;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 2px;
  }
  .quality-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--brown);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .quality-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .quality-value {
    font-size: 0.85rem;
    color: var(--brown);
    font-weight: 700;
    min-width: 2.5rem;
  }

  /* Drop zone */
  .dropzone {
    border: 1.5px dashed var(--border-dark);
    border-radius: 6px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 2.5rem;
    background: var(--white);
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--brown);
    background: var(--brown-dim);
  }
  .dropzone-icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.3; }
  .dropzone-text {
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 0.5rem;
  }
  .dropzone-sub { font-size: 0.68rem; color: var(--text-light); }
  .dropzone-btn {
    display: inline-block;
    margin-top: 1rem;
    background: transparent;
    border: 1px solid var(--brown);
    color: var(--brown);
    font-family: 'Lato', sans-serif;
    font-size: 0.63rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    border-radius: 3px;
  }
  .dropzone-btn:hover { background: var(--brown); color: #fff; }
  #file-input { display: none; }

  /* Progress */
  .progress-bar-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    display: none;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 0.6rem;
    display: flex;
    justify-content: space-between;
  }
  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--brown);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Actions bar */
  .actions-bar {
    display: flex;
    justify-content: flex-end;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .btn-primary {
    background: var(--brown);
    color: #fff;
    border: none;
    border-radius: 3px;
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--brown-dark); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    color: var(--text-mid);
    border: 1px solid var(--border-dark);
    border-radius: 3px;
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.75rem 1.2rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-secondary:hover { border-color: var(--brown); color: var(--brown); }

  /* Results */
  #results { display: none; }
  #results.visible { display: block; }

  .pdf-section { margin-bottom: 3rem; animation: fadeIn 0.4s ease both; }
  .pdf-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--brown);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    font-style: italic;
  }

  .pages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 1.5rem;
  }

  .page-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .page-card:hover {
    border-color: var(--brown-light);
    box-shadow: 0 4px 20px rgba(181,101,29,0.08);
  }

  .page-card-header {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.63rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light);
    background: var(--offwhite);
  }

  .previews-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .preview-cell {
    background: var(--white);
    padding: 0.8rem;
  }
  .preview-cell canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 2px;
    border: 1px solid var(--light-gray);
  }
  .preview-name {
    font-size: 0.58rem;
    color: var(--text-light);
    margin-top: 0.5rem;
    word-break: break-all;
  }
  .preview-badge {
    display: inline-block;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    margin-bottom: 0.4rem;
  }
  .badge-clean { background: var(--brown-dim); color: var(--brown); }
  .badge-protected { background: var(--light-gray); color: var(--text-mid); }

  .page-card-footer {
    padding: 0.6rem 1rem;
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
    border-top: 1px solid var(--border);
    background: var(--offwhite);
  }
  .dl-btn {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid var(--border-dark);
    background: transparent;
    color: var(--text-mid);
    font-family: 'Lato', sans-serif;
    transition: all 0.15s;
  }
  .dl-btn:hover { border-color: var(--brown); color: var(--brown); }
  .dl-btn.brown { border-color: var(--brown); color: var(--brown); }
  .dl-btn.brown:hover { background: var(--brown); color: #fff; }
</style>
</head>

  <main>
    <div class="controls">
      <div class="control-group">
        <span class="control-label">Qualité JPEG</span>
        <input type="range" class="quality-slider" id="quality-slider" min="50" max="90" value="70">
        <span class="quality-value" id="quality-val">70%</span>
      </div>
      <div style="margin-left:auto; font-size:0.68rem; color:var(--text-light); letter-spacing:0.04em;">
        Résolution haute — rendu ×2 → compression JPEG
      </div>
    </div>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">⬚</div>
      <div class="dropzone-text">Déposez vos fichiers PDF ici</div>
      <div class="dropzone-sub">Plusieurs fichiers acceptés simultanément</div>
      <button class="dropzone-btn" onclick="document.getElementById('file-input').click()">Parcourir</button>
      <input type="file" id="file-input" accept=".pdf" multiple>
    </div>

    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-label">
        <span id="progress-text">Traitement en cours…</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="actions-bar" id="actions-bar" style="display:none;">
      <button class="btn-secondary" onclick="resetAll()">Nouvelle conversion</button>
      <button class="btn-primary" id="zip-btn" onclick="downloadZip()">⬇ Télécharger tout (ZIP)</button>
    </div>

    <div id="results"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentUser = '';
let allPages = [];

document.getElementById('auth-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAuth();
});

function handleAuth() {
  const input = document.getElementById('auth-email');
  const errEl = document.getElementById('auth-error');
  const val = input.value.trim().toLowerCase();
  if (!val.endsWith('@galler.com')) {
    input.classList.add('error');
    errEl.textContent = 'Accès réservé aux collaborateurs Galler. Veuillez saisir votre adresse @galler.com.';
    input.focus();
    return;
  }
  input.classList.remove('error');
  errEl.textContent = '';
  currentUser = val;
  const authScreen = document.getElementById('auth-screen');
  authScreen.classList.add('fade-out');
  setTimeout(() => {
    authScreen.style.display = 'none';
    const app = document.getElementById('app');
    app.classList.add('visible');
    document.getElementById('header-user').innerHTML = `Connecté · <span>${currentUser}</span>`;
  }, 600);
}

const slider = document.getElementById('quality-slider');
const qualVal = document.getElementById('quality-val');
slider.addEventListener('input', () => { qualVal.textContent = slider.value + '%'; });

const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf');
  if (files.length) processFiles(files);
});
document.getElementById('file-input').addEventListener('change', e => {
  const files = [...e.target.files];
  if (files.length) processFiles(files);
  e.target.value = '';
});

async function processFiles(files) {
  allPages = [];
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';
  resultsEl.classList.remove('visible');
  document.getElementById('actions-bar').style.display = 'none';
  dropzone.style.display = 'none';
  const progressWrap = document.getElementById('progress-wrap');
  progressWrap.classList.add('visible');
  const quality = parseInt(slider.value) / 100;
  let totalPages = 0;
  let processedPages = 0;
  const pdfDocs = [];
  for (const file of files) {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    totalPages += pdf.numPages;
    pdfDocs.push({ name: file.name.replace(/\.pdf$/i, ''), pdf });
  }
  updateProgress(0, totalPages, 'Préparation…');
  for (const { name, pdf } of pdfDocs) {
    const section = document.createElement('div');
    section.className = 'pdf-section';
    section.innerHTML = `<div class="pdf-section-title">${name}</div><div class="pages-grid" id="grid-${slugify(name)}"></div>`;
    resultsEl.appendChild(section);
    resultsEl.classList.add('visible');
    for (let p = 1; p <= pdf.numPages; p++) {
      updateProgress(processedPages, totalPages, `${name} — page ${p}/${pdf.numPages}`);
      const page = await pdf.getPage(p);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      const cleanBlob = await canvasToBlob(canvas, quality);
      const cleanName = `${name}_page${p}_clean.jpg`;
      const protectedCanvas = document.createElement('canvas');
      protectedCanvas.width = canvas.width;
      protectedCanvas.height = canvas.height;
      const pCtx = protectedCanvas.getContext('2d');
      pCtx.drawImage(canvas, 0, 0);
      addWatermark(pCtx, canvas.width, canvas.height);
      const protectedBlob = await canvasToBlob(protectedCanvas, quality);
      const protectedName = `${name}_page${p}_protected.jpg`;
      allPages.push({ pdfName: name, pageNum: p, cleanBlob, protectedBlob, cleanName, protectedName });
      const card = buildCard(canvas, protectedCanvas, p, cleanName, protectedName, cleanBlob, protectedBlob);
      document.getElementById(`grid-${slugify(name)}`).appendChild(card);
      processedPages++;
      updateProgress(processedPages, totalPages, `${name} — page ${p}/${pdf.numPages}`);
    }
  }
  progressWrap.classList.remove('visible');
  document.getElementById('actions-bar').style.display = 'flex';
  dropzone.style.display = '';
}

function addWatermark(ctx, w, h) {
  const year = new Date().getFullYear();
  const text = `© ${year} Galler all reproduction rights reserved for all countries`;
  const fontSize = Math.max(7, Math.round(w * 0.009));
  ctx.save();
  ctx.font = `${fontSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.32)';
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 3;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  const angle = -30 * Math.PI / 180;
  const spacingX = Math.round(w * 0.38);
  const spacingY = Math.round(h * 0.18);
  for (let x = -w; x < w * 2; x += spacingX) {
    for (let y = -h; y < h * 2; y += spacingY) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }
  }
  ctx.restore();
}

function canvasToBlob(canvas, quality) {
  return new Promise(resolve => { canvas.toBlob(b => resolve(b), 'image/jpeg', quality); });
}

function updateProgress(done, total, label) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-text').textContent = label;
}

function buildCard(cleanCanvas, protectedCanvas, pageNum, cleanName, protectedName, cleanBlob, protectedBlob) {
  const card = document.createElement('div');
  card.className = 'page-card';
  const previewClean = document.createElement('canvas');
  const scaleF = Math.min(1, 300 / cleanCanvas.width);
  previewClean.width = Math.round(cleanCanvas.width * scaleF);
  previewClean.height = Math.round(cleanCanvas.height * scaleF);
  previewClean.getContext('2d').drawImage(cleanCanvas, 0, 0, previewClean.width, previewClean.height);
  const previewProt = document.createElement('canvas');
  previewProt.width = previewClean.width;
  previewProt.height = previewClean.height;
  previewProt.getContext('2d').drawImage(protectedCanvas, 0, 0, previewProt.width, previewProt.height);
  card.innerHTML = `
    <div class="page-card-header">Page ${pageNum}</div>
    <div class="previews-row">
      <div class="preview-cell" id="cell-c-${pageNum}-${Date.now()}">
        <span class="preview-badge badge-clean">Clean</span>
      </div>
      <div class="preview-cell" id="cell-p-${pageNum}-${Date.now()+1}">
        <span class="preview-badge badge-protected">Protégée</span>
      </div>
    </div>
    <div class="page-card-footer">
      <button class="dl-btn" onclick="downloadBlob(this.dataset.blob, this.dataset.name)" data-name="${cleanName}">↓ Clean</button>
      <button class="dl-btn brown" onclick="downloadBlob(this.dataset.blob, this.dataset.name)" data-name="${protectedName}">↓ Protégée</button>
    </div>
  `;
  const cells = card.querySelectorAll('.preview-cell');
  cells[0].appendChild(previewClean);
  const nc = document.createElement('div'); nc.className = 'preview-name'; nc.textContent = cleanName;
  cells[0].appendChild(nc);
  cells[1].appendChild(previewProt);
  const np = document.createElement('div'); np.className = 'preview-name'; np.textContent = protectedName;
  cells[1].appendChild(np);
  const cleanUrl = URL.createObjectURL(cleanBlob);
  const protUrl = URL.createObjectURL(protectedBlob);
  const dlBtns = card.querySelectorAll('.dl-btn');
  dlBtns[0].dataset.blob = cleanUrl;
  dlBtns[1].dataset.blob = protUrl;
  return card;
}

function downloadBlob(url, name) {
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
}

async function downloadZip() {
  if (!allPages.length) return;
  const btn = document.getElementById('zip-btn');
  btn.disabled = true; btn.textContent = 'Préparation du ZIP…';
  const zip = new JSZip();
  const clean = zip.folder('clean');
  const protected_ = zip.folder('protected');
  for (const p of allPages) { clean.file(p.cleanName, p.cleanBlob); protected_.file(p.protectedName, p.protectedBlob); }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `Galler_Packagings_${formatDate()}.zip`; a.click();
  btn.disabled = false; btn.textContent = '⬇ Télécharger tout (ZIP)';
}

function resetAll() {
  allPages = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('actions-bar').style.display = 'none';
  document.getElementById('progress-wrap').classList.remove('visible');
  dropzone.style.display = '';
}

function slugify(str) { return str.replace(/[^a-z0-9]/gi, '_').toLowerCase(); }
function formatDate() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
</script>
